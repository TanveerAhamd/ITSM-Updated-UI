<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="TEF-ITSM provides free IT support and maintenance for government schools and colleges in Pakistan.">
  <title>Register - TEF ITSM</title>

  <!-- Bootstrap + Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <style>
    body {
      font-family: "Inter", sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: url("https://picsum.photos/1920/1080?blur=2") no-repeat center center/cover;
      overflow: hidden;
    }

    .login-box {
      background: #ffffff;
      border-radius: 10px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
      padding: 20px 15px;
      width: 100%;
      max-width: 340px;
      color: #333;
    }

    .login-box h5 {
      font-weight: 600;
      margin-bottom: 12px;
      text-align: center;
      font-size: 1rem;
      color: #222;
    }

    .form-label {
      font-size: 0.8rem;
      color: #444;
    }

    input.form-control {
      font-size: 0.85rem;
      padding: 5px 10px;
      height: 34px;
      border: 1px solid #ddd;
      color: #333;
    }

    input.form-control:focus {
      border-color: #007589;
      box-shadow: none;
    }

    .btn-primary {
      font-size: 0.85rem;
      padding: 6px 0;
      width: 100%;
      background-color: #007589;
      border: none;
    }

    .btn-primary:hover {
      background-color: #005f6b;
    }

    .small {
      font-size: 0.75rem;
    }

    .btn-floating {
      border-radius: 50%;
      width: 28px;
      height: 28px;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      font-size: 0.75rem;
      background: #007589;
      border: none;
      color: #fff;
      transition: 0.3s;
    }

    .btn-floating:hover {
      background: #005f6b;
    }

    .logo img {
      width: 70px;
      margin-bottom: 8px;
    }

    .divider {
      text-align: center;
      margin: 8px 0;
      font-size: 0.75rem;
      color: #777;
    }

    .password-wrapper {
      position: relative;
    }

    .password-wrapper i {
      position: absolute;
      right: 10px;
      top: 60%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #888;
    }

    .password-wrapper i:hover {
      color: #007589;
    }

    @media (max-width: 576px) {
      .login-box {
        max-width: 280px;
        padding: 15px 12px;
      }

      .logo img {
        width: 60px;
      }

      input.form-control {
        height: 30px;
        font-size: 0.75rem;
      }

      .btn-primary {
        font-size: 0.75rem;
        padding: 5px 0;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-10 col-sm-8 col-md-6 col-lg-4">
        <div class="login-box text-center">
          <div class="logo">
            <a href="indexx.html"><img src="./assets/images/Itsmlogo.png" alt="Logo"></a>
          </div>
          <h5>Create Your Account</h5>
          <form>
            <div class="mb-2 text-start">
              <label class="form-label" for="name">Full Name</label>
              <input type="text" id="name" class="form-control" placeholder="Enter full name" required />
            </div>

            <div class="mb-2 text-start">
              <label class="form-label" for="email">Email</label>
              <input type="email" id="email" class="form-control" placeholder="Enter email" required />
            </div>

            <div class="mb-2 text-start password-wrapper">
              <label class="form-label" for="password">Password</label>
              <input type="password" id="password" class="form-control" placeholder="Enter password" required />
              <i class="fa-solid fa-eye" id="togglePassword"></i>
            </div>

            <div class="mb-2 text-start password-wrapper">
              <label class="form-label" for="confirmPassword">Confirm Password</label>
              <input type="password" id="confirmPassword" class="form-control" placeholder="Re-enter password" required />
              <i class="fa-solid fa-eye" id="toggleConfirmPassword"></i>
            </div>

            <div class="form-check text-start mb-2">
              <input class="form-check-input" type="checkbox" id="terms" style="scale:0.9;" required>
              <label class="form-check-label small" for="terms">
                I agree to the <a href="#" class="text-primary">Terms & Conditions</a>
              </label>
            </div>

            <button type="submit" class="btn btn-primary w-100">Register</button>

            <p class="small fw-bold mt-2 mb-0">
              Already have an account? <a href="login.html" class="text-primary">Login here</a>
            </p>

            <div class="divider">Or</div>

            <div class="d-flex justify-content-center">
              <button type="button" class="btn-floating mx-1"><i class="fab fa-facebook-f"></i></button>
              <button type="button" class="btn-floating mx-1"><i class="fab fa-twitter"></i></button>
              <button type="button" class="btn-floating mx-1"><i class="fab fa-linkedin-in"></i></button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // Toggle Password Visibility
    const togglePassword = document.getElementById("togglePassword");
    const passwordInput = document.getElementById("password");
    togglePassword.addEventListener("click", () => {
      const type = passwordInput.getAttribute("type") === "password" ? "text" : "password";
      passwordInput.setAttribute("type", type);
      togglePassword.classList.toggle("fa-eye-slash");
    });

    const toggleConfirmPassword = document.getElementById("toggleConfirmPassword");
    const confirmPasswordInput = document.getElementById("confirmPassword");
    toggleConfirmPassword.addEventListener("click", () => {
      const type = confirmPasswordInput.getAttribute("type") === "password" ? "text" : "password";
      confirmPasswordInput.setAttribute("type", type);
      toggleConfirmPassword.classList.toggle("fa-eye-slash");
    });
  </script>
</body>
</html>
